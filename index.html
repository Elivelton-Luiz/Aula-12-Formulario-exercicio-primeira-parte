<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário Carros Elétricos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form class="container">
        <h1>Carros Elétricos</h1>

        <div class="campo">
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" placeholder="Digite seu nome completo">
        </div>

        <div class="campo">
            <label for="modelo">Modelo de carro elétrico favorito:</label>
            <input type="text" id="modelo" placeholder="Ex: Tesla Model 3">
        </div>

        <div class="campo">
            <label for="senha">Crie uma senha de acesso:</label>
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres">
        </div>

        <div class="botoes">
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </div>
    </form>

</body>
</html>
